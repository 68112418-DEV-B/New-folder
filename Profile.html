<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card - แนะนำตัว</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 2rem 0;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .profile-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .profile-image {
            width: 100%;
            height: auto;
            object-fit: cover;
            transition: all 0.4s ease;
        }

        .profile-card:hover .profile-image {
            transform: scale(1.05);
        }

        .profile-info h1 {
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-info .title {
            color: #667eea;
            font-weight: 500;
        }

        .skill-badge {
            background: #f0f4ff;
            color: #667eea;
            border: 1px solid #e0e7ff;
            border-radius: 50px;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            display: inline-block;
            margin: 0.4rem 0.4rem 0.4rem 0;
            transition: all 0.3s ease;
        }

        .skill-badge:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .btn-instagram {
            background: linear-gradient(45deg, #f56040, #c13584, #833ab4) !important;
            border: none;
            color: white;
        }

        .btn-instagram:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(245, 96, 64, 0.4);
        }

        .btn-tiktok {
            background: linear-gradient(45deg, #000, #545454) !important;
            border: none;
            color: white;
        }

        .btn-tiktok:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .profile-card {
                border-radius: 16px;
            }
        }

        @media (max-width: 576px) {
            .profile-card {
                border-radius: 12px;
            }

            .profile-info {
                padding: 1.5rem 1.2rem !important;
            }

            .profile-info h1 {
                font-size: 1.8rem !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center py-5">
            <div class="col-lg-8">
                <div class="profile-card">
                    <div class="row g-0">
                        <!-- Left Column: Image -->
                        <div class="col-md-5 bg-gradient" style="background: linear-gradient(45deg, #667eea, #764ba2);">
                            <img src="/name.jpg" 
                                 alt="Profile Picture" 
                                 class="profile-image img-fluid rounded-circle p-4"
                                 style="display: block; margin: auto; margin-top: 2rem;">
                        </div>

                        <!-- Right Column: Info -->
                        <div class="col-md-7 profile-info p-5">
                            <h1 class="display-5 fw-bold mb-2">Krittapas Thipsangwong</h1>
                            <p class="title fs-5 mb-4">Full Stack Developer | Web Designer</p>
                            
                            <p class="mb-4 text-dark">
                                สวัสดีครับ! ยินดีที่ได้รู้จักกัน<br>
                                ผมเป็นนักพัฒนาเว็บที่มีความหลงใหลในการสร้างประสบการณ์ดิจิทัลที่สวยงามและใช้งานได้จริง
                            </p>

                            <!-- Skills -->
                            <div class="mb-4">
                                <h5 class="text-dark fw-bold mb-3">ทักษะหลัก</h5>
                                <div>
                                    <span class="skill-badge">HTML5</span>
                                    <span class="skill-badge">CSS3</span>
                                    <span class="skill-badge">JavaScript</span>
                                    <span class="skill-badge">Python</span>
                                    <span class="skill-badge">TypeScript</span>
                                    <span class="skill-badge">Bootstrap</span>
                                    <span class="skill-badge">React</span>
                                    <span class="skill-badge">Node.js</span>
                                </div>
                            </div>

                            <!-- Social Buttons -->
                            <div class="d-grid gap-2 d-md-flex">
                                <a href="https://www.instagram.com" 
                                   target="_blank" 
                                   class="btn btn-instagram btn-lg flex-fill">
                                    <i class="bi bi-instagram"></i> Instagram
                                </a>
                                <a href="https://www.tiktok.com" 
                                   target="_blank" 
                                   class="btn btn-tiktok btn-lg flex-fill">
                                    <i class="bi bi-tiktok"></i> TikTok
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
